merge_protections:
- if:
  - base=20260505074823/test_batch_success_with_merge_protection/main
  name: review required
  success_conditions:
  - '#approved-reviews-by>=1'
merge_queue:
  max_parallel_checks: 5
queue_rules:
- autoqueue: true
  batch_max_wait_time: 0 s
  batch_size: 3
  merge_conditions:
  - status-success=continuous-integration/fake-ci
  merge_method: merge
  name: default
  queue_conditions:
  - base=20260505074823/test_batch_success_with_merge_protection/main
  - label=queue
